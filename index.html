<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="navBar">
      <span> Kanban Board </span>
      <button id="addTask">Add Task</button>
    </div>

    <div class="mainBody">
      <div class="to-do column">
        <div class="header">
          <span> To Do </span>
          <span>Count</span>
        </div>
        <div draggable="true" class="task dragging">
          <h2>Task 1</h2>
          <p>Task 1 description</p>
          <div>
            <button>Delete</button>
          </div>
        </div>
      </div>

      <div class="progress column">
        <div class="header">
          <span> Progress </span>
          <span>Count</span>
        </div>
      </div>

      <div class="done column">
        <div class="header">
          <span> Done </span>

          <span>Count</span>
        </div>
      </div>
    </div>

    <div class="modal add-container">
      <div class="bg"></div>
      <div class="center">
        <h3>Add Task</h3>
        <input type="text" placeholder="Enter Task Name" />
        <textarea placeholder="Task Description"></textarea>
        <button class="add">Add task</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
