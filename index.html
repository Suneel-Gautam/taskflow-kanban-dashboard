<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="navBar">
      <span> Kanban Board </span>

      <button>Add Task</button>
    </div>

    <div class="mainBody">
      <div class="to-do">
        <div class="header">
          <span> To Do </span>
          <span>Count</span>
        </div>
      </div>

      <div class="progress">
        <div class="header">
          <span> Progress </span>
          <span>Count</span>
        </div>
      </div>

      <div class="done">
        <div class="header">
          <span> Done </span>

          <span>Count</span>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
