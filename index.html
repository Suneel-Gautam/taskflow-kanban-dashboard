<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="navBar">
      <span> Kanban Board </span>
      <button id="addTask">Add Task</button>
    </div>

    <div class="mainBody">
      <div class="to-do column">
        <div class="header">
          <span> To Do </span>
          <span>Count</span>
        </div>
        <div class="todoTaskContainer">

        </div>

      </div>

      <div class="progress column">
        <div class="header">
          <span> Progress </span>
          <span>Count</span>
        </div>
          <div class="progressTaskContainer">

        </div>
      </div>

      <div class="done column">
        <div class="header">
          <span> Done </span>

          <span>Count</span>
        </div>

        <div class="donetaskContainer">

        </div>
      </div>
    </div>

    <div class="modal" id="addcontainer">
      <div class="bg"></div>
      <div class="center">
        <div class="close" id="closeButton">
          <span aria-hidden="true">&times;</span>
        </div>
        <h3>Add Task</h3>
        <input id="taskName" type="text" placeholder="Enter Task Name" />
        <textarea
          id="taskDescription"
          placeholder="Task Description"
        ></textarea>
        <div class="error"></div>
        <button class="add" id="AddTaskButton">Add task</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
